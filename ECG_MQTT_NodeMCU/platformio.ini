; ============================================================
;  共用設定（所有環境繼承）
;  upload_speed 降為 460800 以避免「Serial data stream stopped」燒錄中斷
;  若仍失敗，可再降到 115200
; ============================================================
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_port = COM5
monitor_port = COM5

lib_deps =
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    knolleary/PubSubClient @ ^2.8

; ============================================================
;  正式韌體環境（完整 ECG 系統，含 WiFi/MQTT）— 編譯 src/main.cpp
; ============================================================
[env:esp32dev]
build_src_filter = +<main.cpp>

; ============================================================
;  第 3 步 離線測試環境 — 編譯 main.cpp 但定義 OFFLINE_MODE
;  跳過 WiFi/MQTT，BPM 與波形改由序列埠輸出（Teleplot 可看）
;  使用方式：PlatformIO 側邊欄 → esp32_offline → Upload → Monitor/Teleplot
; ============================================================
[env:esp32_offline]
build_src_filter = +<main.cpp>
build_flags = -D OFFLINE_MODE

; ============================================================
;  第 0 步測試環境（最小燒錄驗證）— 只編譯 src/test_blink.cpp
; ============================================================
[env:esp32_test]
build_src_filter = +<test_blink.cpp>

; ============================================================
;  第 1 步測試環境（I2C 掃描）— 只編譯 src/test_i2c_scanner.cpp
; ============================================================
[env:esp32_i2c]
build_src_filter = +<test_i2c_scanner.cpp>

; ============================================================
;  第 1 步（續）LCD 顯示測試 — 只編譯 src/test_lcd.cpp
; ============================================================
[env:esp32_lcd]
build_src_filter = +<test_lcd.cpp>

; ============================================================
;  第 2 步 AD8232 心電訊號讀取 — 只編譯 src/test_ecg_read.cpp
; ============================================================
[env:esp32_ecg]
build_src_filter = +<test_ecg_read.cpp>
